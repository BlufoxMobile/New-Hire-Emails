<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blufox Mobile — New Hire Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #071a0e;
    --surface: #0d2417;
    --surface2: #132e1e;
    --border: #1e4a2e;
    --accent: #2ecc71;
    --accent2: #a8ff78;
    --text: #e8f5ec;
    --muted: #6b9e7a;
    --success: #57f59a;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(46,204,113,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(168,255,120,0.07) 0%, transparent 60%);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,26,14,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), #a8ff78);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }

  .header-actions { display: flex; align-items: center; gap: 14px; }

  .admin-link {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 50px;
    transition: all 0.2s;
  }
  .admin-link:hover { color: var(--text); border-color: var(--muted); background: var(--surface2); }

  .directory-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 50px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .directory-pill.loaded  { color: var(--success); background: rgba(87,245,154,0.10); }
  .directory-pill.loading { color: var(--muted);   background: rgba(107,158,122,0.10); }
  .directory-pill.error   { color: #ff7a7a;         background: rgba(255,82,82,0.10); }
  .directory-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  main { max-width: 640px; margin: 0 auto; padding: 48px 24px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; font-weight: 400; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .span2 { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,204,113,0.18);
  }
  select option { background: var(--surface2); }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); background: var(--surface2); }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { background: #33eeaa; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(87,245,154,0.35); }
  .btn-success:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; align-items: center; }

  .directory-error {
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.3);
    color: #ffb0b0;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 13px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .directory-error .retry {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  .directory-error .retry:hover { background: rgba(255,255,255,0.05); }

  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--success);
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 22px;
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: #ff5252; color: #fff; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .spinner.small-muted {
    width: 10px; height: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: currentColor;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header { padding: 16px 20px; flex-direction: column; gap: 14px; }
    main { padding: 28px 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .page-title { font-size: 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Blufox <span>Mobile</span></div>
  <div class="header-actions">
    <span id="directoryStatus" class="directory-pill loading"><span class="spinner small-muted"></span> Loading directory…</span>
    <a class="admin-link" href="https://blufoxmobile.github.io/Admin-Panel-Directory/" target="_blank" rel="noopener">Manage stores →</a>
  </div>
</header>

<main>
  <div class="page-title">New Hire Form</div>
  <div class="page-subtitle">Select a store, then fill in the new rep's info. Submission triggers the onboarding email.</div>

  <div id="directoryError" class="directory-error" style="display:none">
    <div>
      <strong>Could not load Store Directory.</strong>
      <div id="directoryErrorDetail" style="opacity:.85;font-size:12px;margin-top:4px"></div>
    </div>
    <button class="retry" onclick="loadDirectory()">Retry</button>
  </div>

  <!-- STORE SELECTOR -->
  <div class="card">
    <div class="card-title">Store</div>
    <div class="field">
      <label>Store Name</label>
      <select id="storeSelect" onchange="onStoreSelect()" disabled>
        <option value="">— Loading stores… —</option>
      </select>
    </div>
  </div>

  <!-- NEW HIRE INFO -->
  <div class="card">
    <div class="card-title">New Rep Information</div>
    <div class="form-grid">
      <div class="field span2">
        <label>Full Name</label>
        <input type="text" id="hireName" placeholder="First and Last Name">
      </div>
      <div class="field">
        <label>Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label>RQ4 Username</label>
        <input type="text" id="rq4User" placeholder="e.g. jsmith">
      </div>
      <div class="field">
        <label>Blufox Email</label>
        <input type="email" id="blufoxEmail" placeholder="name@blufoxmobile.com">
      </div>
      <div class="field">
        <label>Personal Email</label>
        <input type="email" id="personalEmail" placeholder="personal@email.com">
      </div>
    </div>
  </div>

  <!-- Hidden fields — auto-filled from directory, sent in webhook payload -->
  <input type="hidden" id="storeAddress">
  <input type="hidden" id="storeCity">
  <input type="hidden" id="storeState">
  <input type="hidden" id="storeZip">
  <input type="hidden" id="managerName">
  <input type="hidden" id="managerEmail">
  <input type="hidden" id="dmEmail">
  <input type="hidden" id="asmEmail">

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="clearForm()">Clear Form</button>
    <button class="btn btn-success" onclick="submitForm()" id="submitBtn" disabled>
      <span class="spinner" id="spinner"></span>
      <span id="submitLabel">Send Onboarding Email →</span>
    </button>
  </div>

</main>

<div id="toast">✓ <span id="toastMsg"></span></div>

<script>
// ============================================================================
//  CONFIG
// ============================================================================
const DIRECTORY_URL = 'https://raw.githubusercontent.com/blufoxmobile/Daily-Sales-Report/main/data/store-directory.json';
const ZAPIER_WEBHOOK = 'https://hooks.zapier.com/hooks/catch/20441079/ue0hxpm/';

// ============================================================================
//  STATE
// ============================================================================
let directory = {
  stores: [],
  storeAddresses: {},
  storeManagerNames: {},
  storeManagers: {},
  storeDMs: {}
};

// ============================================================================
//  UI HELPERS
// ============================================================================
function setDirectoryStatus(state, label){
  const el = document.getElementById('directoryStatus');
  el.className = 'directory-pill ' + state;
  el.innerHTML = state === 'loading'
    ? '<span class="spinner small-muted"></span> ' + label
    : '<span class="dot"></span> ' + label;
}

function showDirectoryError(msg){
  document.getElementById('directoryError').style.display = 'flex';
  document.getElementById('directoryErrorDetail').textContent = msg || '';
}
function hideDirectoryError(){ document.getElementById('directoryError').style.display = 'none'; }

// ============================================================================
//  DIRECTORY FETCH
// ============================================================================
async function loadDirectory(){
  setDirectoryStatus('loading', 'Loading directory…');
  hideDirectoryError();
  document.getElementById('storeSelect').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  try {
    const resp = await fetch(DIRECTORY_URL + '?_=' + Date.now(), { cache: 'no-store' });
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    directory = {
      stores:            Array.isArray(json.stores) ? json.stores.slice() : [],
      storeAddresses:    (json.storeAddresses    && typeof json.storeAddresses    === 'object') ? json.storeAddresses    : {},
      storeManagerNames: (json.storeManagerNames && typeof json.storeManagerNames === 'object') ? json.storeManagerNames : {},
      storeManagers:     (json.storeManagers     && typeof json.storeManagers     === 'object') ? json.storeManagers     : {},
      storeDMs:          (json.storeDMs          && typeof json.storeDMs          === 'object') ? json.storeDMs          : {}
    };
    populateStoreDropdown();
    document.getElementById('storeSelect').disabled = false;
    document.getElementById('submitBtn').disabled = false;
    const updated = json.updatedAt ? new Date(json.updatedAt) : null;
    setDirectoryStatus('loaded', updated
      ? 'Directory loaded · ' + updated.toLocaleDateString('en-US', { month:'short', day:'numeric' })
      : 'Directory loaded');
  } catch(err) {
    console.error('Directory load failed', err);
    setDirectoryStatus('error', 'Directory error');
    showDirectoryError(err.message || String(err));
    document.getElementById('storeSelect').innerHTML = '<option value="">— Directory unavailable —</option>';
  }
}

function populateStoreDropdown(){
  const sel = document.getElementById('storeSelect');
  sel.innerHTML = '<option value="">— Select a Store —</option>';
  directory.stores.slice().sort((a,b) => a.localeCompare(b)).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    // Show city/state hint from address if available
    const fullAddr = directory.storeAddresses[name] || '';
    const parts = fullAddr ? fullAddr.split(',') : [];
    // address format: "street, city, state zip" — city is index -2, state+zip is index -1
    let hint = '';
    if(parts.length >= 3){
      const stateZip = parts[parts.length - 1].trim().split(' ');
      const state = stateZip[0] || '';
      const city  = parts[parts.length - 2].trim();
      hint = city && state ? ` — ${city}, ${state}` : '';
    }
    opt.textContent = name + hint;
    sel.appendChild(opt);
  });
}

// ============================================================================
//  STORE SELECTION — silently populate hidden fields
// ============================================================================
function onStoreSelect(){
  const storeName = document.getElementById('storeSelect').value;

  if(!storeName){
    ['storeAddress','storeCity','storeState','storeZip','managerName','managerEmail','dmEmail','asmEmail']
      .forEach(id => { document.getElementById(id).value = ''; });
    return;
  }

  // Parse full address string "street, city, state zip"
  const fullAddr = directory.storeAddresses[storeName] || '';
  let street = '', city = '', state = '', zip = '';
  if(fullAddr){
    const parts = fullAddr.split(',').map(s => s.trim());
    if(parts.length >= 3){
      // Last part: "state zip"
      const lastParts = parts[parts.length - 1].split(' ').filter(Boolean);
      state = lastParts[0] || '';
      zip   = lastParts[1] || '';
      city  = parts[parts.length - 2];
      street = parts.slice(0, parts.length - 2).join(', ');
    } else {
      street = fullAddr;
    }
  }

  document.getElementById('storeAddress').value  = street;
  document.getElementById('storeCity').value      = city;
  document.getElementById('storeState').value     = state;
  document.getElementById('storeZip').value       = zip;
  document.getElementById('managerName').value    = directory.storeManagerNames[storeName] || '';
  document.getElementById('managerEmail').value   = directory.storeManagers[storeName]     || '';
  document.getElementById('dmEmail').value        = directory.storeDMs[storeName]          || '';
  document.getElementById('asmEmail').value      = (directory.storeAMs || {})[storeName]    || '';
}

// ============================================================================
//  SUBMIT
// ============================================================================
async function submitForm(){
  const storeName     = document.getElementById('storeSelect').value;
  const hireName      = document.getElementById('hireName').value.trim();
  const startDate     = document.getElementById('startDate').value;
  const rq4User       = document.getElementById('rq4User').value.trim();
  const blufoxEmail   = document.getElementById('blufoxEmail').value.trim();
  const personalEmail = document.getElementById('personalEmail').value.trim();

  if(!storeName || !hireName || !startDate || !rq4User || !blufoxEmail || !personalEmail){
    showToast('Please fill in all required fields.', true);
    return;
  }

  const payload = {
    store_name:     storeName,
    store_address:  document.getElementById('storeAddress').value,
    store_city:     document.getElementById('storeCity').value,
    store_state:    document.getElementById('storeState').value,
    store_zip:      document.getElementById('storeZip').value,
    hire_name:      hireName,
    start_date:     startDate,
    rq4_username:   rq4User,
    blufox_email:   blufoxEmail,
    personal_email: personalEmail,
    manager_name:   document.getElementById('managerName').value,
    manager_email:  document.getElementById('managerEmail').value,
    dm_email:       document.getElementById('dmEmail').value,
    asm_email:      document.getElementById('asmEmail').value,
    submitted_at:   new Date().toISOString()
  };

  document.getElementById('spinner').style.display = 'block';
  document.getElementById('submitLabel').textContent = 'Sending…';
  document.getElementById('submitBtn').disabled = true;

  try {
    const formData = new URLSearchParams();
    Object.entries(payload).forEach(([k, v]) => formData.append(k, v));
    await fetch(ZAPIER_WEBHOOK, { method: 'POST', body: formData });
    showToast(`Onboarding email triggered for ${hireName}!`);
    clearForm();
  } catch(err) {
    showToast('Failed to send. Check webhook URL or network.', true);
    console.error(err);
  } finally {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('submitLabel').textContent = 'Send Onboarding Email →';
    document.getElementById('submitBtn').disabled = false;
  }
}

function clearForm(){
  ['storeSelect','hireName','startDate','rq4User','blufoxEmail','personalEmail']
    .forEach(id => { document.getElementById(id).value = ''; });
  ['storeAddress','storeCity','storeState','storeZip','managerName','managerEmail','dmEmail','asmEmail']
    .forEach(id => { document.getElementById(id).value = ''; });
}

// ============================================================================
//  TOAST + HELPERS
// ============================================================================
let toastTimer;
function showToast(msg, isError = false){
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.className = isError ? 'show error' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================================
//  INIT
// ============================================================================
loadDirectory();
</script>
</body>
</html>
